basePath: /
info:
  contact: {}
  description: HTTP API for Fintrack. Most routes require a session cookie `fintrack_session`
    set by login or initial bootstrap.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Fintrack API
  version: "1.0"
paths:
  /api/auth/account-data:
    delete:
      description: Permanently deletes the signed-in user and clears the session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Delete account
      tags:
      - auth
    get:
      description: Returns a downloadable JSON export of the signed-in user's data.
      produces:
      - application/json
      responses:
        "200":
          description: JSON attachment
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Export account JSON
      tags:
      - auth
  /api/auth/bootstrap:
    post:
      consumes:
      - application/json
      parameters:
      - description: email, password, name, preferredCurrency
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Initial bootstrap (first admin)
      tags:
      - auth
  /api/auth/bootstrap-status:
    get:
      description: Returns whether the database has zero users (initial setup required).
      produces:
